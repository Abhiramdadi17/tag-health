<div *ngIf="loading()" class="flex items-center justify-center h-full text-sm"
     [style.background]="C().BG_BASE" [style.color]="C().CYAN">
  Loading tags from server…
</div>

<div *ngIf="!loading() && error()" class="flex items-center justify-center h-full"
     [style.background]="C().BG_BASE">
  <div class="flex flex-col items-center gap-2" style="color:#991B1B;">
    <lucide-angular [img]="AlertIcon" [size]="24"></lucide-angular>
    <p class="text-sm font-medium">{{ error() }}</p>
    <p class="text-xs" [style.color]="C().MUTED">Make sure forecasting_api.py is running on port 5050</p>
  </div>
</div>

<div *ngIf="!loading() && !error()" class="flex flex-col h-full" [style.background]="C().BG_BASE">

  <!-- ── Top Metrics Bar ──────────────────────────────── -->
  <div class="border-b px-6 py-2.5 flex items-center gap-4"
       [style.background]="C().BG_PANEL"
       [style.border-color]="C().BORDER">

    <!-- Health score pill -->
    <div class="metric-pill-health">
      ⬤ {{ healthScore() }}% Health
    </div>

    <!-- Counts -->
    <span class="metric-readout" style="font-size:13px;" [style.color]="C().MUTED">
      {{ filteredTags().length.toLocaleString() }}&thinsp;/&thinsp;{{ tags().length.toLocaleString() }} rows
    </span>

    <span class="metric-readout" [style.color]="C().MUTED">·</span>

    <span class="metric-readout" style="font-size:13px;" [style.color]="C().MUTED">
      {{ batchCount() }} batches
    </span>

    <!-- Spacer -->
    <div class="flex-1"></div>

    <!-- LIVE indicator -->
    <div class="flex items-center gap-2">
      <div class="live-dot"></div>
      <span style="font-size:13px;font-weight:600;font-family:'Figtree',sans-serif;"
            [style.color]="C().TEXT">LIVE</span>
    </div>

    <!-- Date range pills -->
    <div class="flex items-center gap-1">
      <button class="date-pill" [class.active]="dateRange() === '1h'" (click)="setDateRange('1h')">1h</button>
      <button class="date-pill" [class.active]="dateRange() === '6h'" (click)="setDateRange('6h')">6h</button>
      <button class="date-pill" [class.active]="dateRange() === '24h'" (click)="setDateRange('24h')">24h</button>
      <button class="date-pill" [class.active]="dateRange() === '7d'" (click)="setDateRange('7d')">7d</button>
    </div>
  </div>

  <!-- ── Filter Bar ─────────────────────────────────────── -->
  <div class="border-b px-6 py-3 flex items-center gap-3"
       [style.background]="C().BG_PANEL"
       [style.border-color]="C().BORDER">

    <!-- Search -->
    <div class="relative flex-1" style="min-width:200px;max-width:380px;">
      <svg class="absolute left-3 top-1/2 -translate-y-1/2 pointer-events-none"
           width="15" height="15" viewBox="0 0 24 24" fill="none"
           [attr.stroke]="C().MUTED" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text"
             class="search-bar"
             placeholder="Search tag, material, batch…"
             [ngStyle]="inputStyle()"
             [ngModel]="searchQuery()"
             (ngModelChange)="searchQuery.set($event)" />
    </div>

    <!-- Zone / Plant filter -->
    <select class="filter-select"
            [ngStyle]="inputStyle()"
            [ngModel]="selectedPlant()"
            (ngModelChange)="selectedPlant.set($event)">
      <option *ngFor="let p of plants()" [value]="p">
        {{ p === 'ALL' ? 'All Plants' : 'Plant ' + p }}
      </option>
    </select>

    <!-- Recipe filter -->
    <select class="filter-select"
            [ngStyle]="inputStyle()"
            [ngModel]="selectedRecipe()"
            (ngModelChange)="selectedRecipe.set($event)">
      <option *ngFor="let r of recipes()" [value]="r">
        {{ r === 'ALL' ? 'All Recipes' : 'Recipe ' + r }}
      </option>
    </select>

    <!-- Material filter -->
    <select class="filter-select"
            [ngStyle]="inputStyle()"
            [ngModel]="selectedMaterial()"
            (ngModelChange)="selectedMaterial.set($event)">
      <option *ngFor="let m of materials()" [value]="m">
        {{ m === 'ALL' ? 'All Materials' : m }}
      </option>
    </select>

    <!-- Status filter -->
    <select class="filter-select"
            [ngStyle]="inputStyle()"
            [ngModel]="selectedStatus()"
            (ngModelChange)="selectedStatus.set($event)">
      <option value="ALL">All Statuses</option>
      <option value="OK">OK</option>
      <option value="NORMAL">NORMAL</option>
      <option value="ALERT">ALERT</option>
      <option value="WARNING">WARNING</option>
      <option value="SEVERE">SEVERE</option>
      <option value="CRITICAL">CRITICAL</option>
    </select>
  </div>

  <!-- ── Main Content ─────────────────────────────────── -->
  <div class="flex flex-1 overflow-hidden">

    <!-- Table area -->
    <div class="flex-1 overflow-y-auto" style="padding:24px;">
      <app-tags-monitor-table
        [tags]="filteredTags()"
        (tagClick)="onTagClick($event)">
      </app-tags-monitor-table>
    </div>

    <!-- Detail drawer -->
    <div *ngIf="selectedTag() as tag"
         class="w-96 border-l overflow-y-auto animate-slide-in"
         [style.background]="C().BG_PANEL"
         [style.border-color]="C().BORDER">
      <app-prediction-drawer
        [tag]="tag"
        [prediction]="selectedPrediction()"
        (closed)="closeDrawer()">
      </app-prediction-drawer>
    </div>

  </div>
</div>
