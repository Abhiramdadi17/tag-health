<div *ngIf="loading()" class="flex items-center justify-center h-full text-sm"
     [style.background]="C().BG_BASE" [style.color]="C().CYAN">
  Loading tags from server...
</div>

<div *ngIf="!loading() && error()" class="flex items-center justify-center h-full"
     [style.background]="C().BG_BASE">
  <div class="flex flex-col items-center gap-2" [style.color]="C().PINK">
    <lucide-angular [img]="AlertIcon" [size]="24"></lucide-angular>
    <p class="text-sm font-medium">{{ error() }}</p>
    <p class="text-xs" [style.color]="C().MUTED">Make sure forecasting_api.py is running on port 5050</p>
  </div>
</div>

<div *ngIf="!loading() && !error()" class="flex flex-col h-full" [style.background]="C().BG_BASE">
  <!-- Filter Bar -->
  <div class="border-b px-6 py-3 flex gap-3" [ngStyle]="filterBarStyle()">
    <input type="text" placeholder="Search tag, material, batch..."
           [ngStyle]="searchStyle()"
           [ngModel]="searchQuery()"
           (ngModelChange)="searchQuery.set($event)" />
    <select [ngStyle]="selectStyle()"
            [ngModel]="selectedPlant()"
            (ngModelChange)="selectedPlant.set($event)">
      <option *ngFor="let p of plants()" [value]="p">Plant {{ p }}</option>
    </select>
    <select [ngStyle]="selectStyle()"
            [ngModel]="selectedRecipe()"
            (ngModelChange)="selectedRecipe.set($event)">
      <option *ngFor="let r of recipes()" [value]="r">Recipe {{ r }}</option>
    </select>
    <select [ngStyle]="selectStyle()"
            [ngModel]="selectedMaterial()"
            (ngModelChange)="selectedMaterial.set($event)">
      <option *ngFor="let m of materials()" [value]="m">Material {{ m }}</option>
    </select>
    <select [ngStyle]="selectStyle()"
            [ngModel]="selectedStatus()"
            (ngModelChange)="selectedStatus.set($event)">
      <option value="ALL">Status ALL</option>
      <option value="OK">OK</option>
      <option value="ALERT">ALERT</option>
      <option value="WARNING">WARNING</option>
      <option value="SEVERE">SEVERE</option>
      <option value="CRITICAL">CRITICAL</option>
    </select>
  </div>

  <!-- Main Content -->
  <div class="flex flex-1 overflow-hidden">
    <div class="flex-1 overflow-y-auto p-4">
      <app-tags-monitor-table [tags]="filteredTags()" (tagClick)="onTagClick($event)"></app-tags-monitor-table>
    </div>

    <div *ngIf="selectedTag() as tag" class="w-96 border-l overflow-y-auto"
         [ngStyle]="rightPanelStyle()">
      <app-prediction-drawer
        [tag]="tag"
        [prediction]="selectedPrediction()"
        (closed)="closeDrawer()"></app-prediction-drawer>
    </div>
  </div>
</div>
