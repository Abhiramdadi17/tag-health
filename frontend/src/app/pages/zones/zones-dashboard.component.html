<div class="flex flex-col h-full" [style.background]="C().BG_BASE">

  <!-- ════════════════════════════════════════════════════════════
       FILTER BAR
  ════════════════════════════════════════════════════════════ -->
  <div class="border-b sticky top-0 z-30" [ngStyle]="filterBarStyle()">

    <!-- ── Row 1: Zones + Status + Search + Health + Refresh ── -->
    <div class="px-4 py-2 flex items-center gap-2 flex-wrap">

      <!-- Search -->
      <input type="text"
             placeholder="Search tag, machine, recipe…"
             class="flex-1 min-w-[160px]"
             [ngStyle]="searchStyle()"
             [ngModel]="filter()"
             (ngModelChange)="filter.set($event)" />

      <!-- Right side: loading / error / health / refresh -->
      <span *ngIf="loading()" class="text-[11px] font-bold animate-pulse"
            [style.color]="C().YELLOW">LOADING…</span>
      <span *ngIf="error()" class="text-[11px] font-bold"
            [style.color]="C().PINK">{{ error() }}</span>
      <div class="px-2.5 py-0.5 rounded border text-[11px] font-bold tracking-wider"
           [ngStyle]="healthHeroStyle()"
           [title]="filteredRows().length + ' rows in view'">
        {{ globalHealthScore().toFixed(1) }}%
      </div>
      <button type="button" (click)="refresh()" [ngStyle]="refreshBtnStyle()">REFRESH</button>
    </div>

  </div><!-- /filter bar -->

  <!-- Table — min-h-0 is required so flex-1 can actually shrink below content height -->
  <div class="flex-1 min-h-0 overflow-auto p-4">
    <app-unified-tags-table
      [rows]="filteredRows()"
      [batchHealth]="batchHealth()"
      [zoneOptions]="zoneOptionsList()"
      [statusOptions]="statusOptionsList()"
      [selectedZone]="selectedZone()"
      [selectedStatus]="selectedStatus()"
      [onlyDataAvailable]="onlyDataAvailable()"
      [dataAvailableCount]="dataAvailableCount()"
      [dateFrom]="dateFrom()"
      [dateTo]="dateTo()"
      [activePreset]="activePreset()"
      [dateHint]="formatRangeHint()"
      [zoneFilters]="zoneFilters()"
      [psmOpts]="psmOptions()"
      [sigmaOpts]="sigmaOptions()"
      [siloOpts]="siloOptions()"
      [packagingOpts]="packagingOptions()"
      [zoneFiltersOpen]="zoneFiltersOpen()"
      [activeFilterCount]="activeFilterCount()"
      (zoneChange)="setZone($event)"
      (statusChange)="setStatus($event)"
      (dataAvailableChange)="onlyDataAvailable.set($event)"
      (dateFromChange)="dateFrom.set($event)"
      (dateToChange)="dateTo.set($event)"
      (applyPreset)="applyDatePreset($event)"
      (clearDate)="clearDateRange()"
      (zoneFiltersOpenChange)="zoneFiltersOpen.set($event)"
      (filterChange)="handleFilterChange($event)"
      (resetFilters)="resetZoneFilters()"
      (rowClick)="selectedRow.set($event)">
    </app-unified-tags-table>
  </div>
</div>

<!-- Tag detail drawer (portal-like, fixed positioning) -->
<app-tag-detail-drawer
  [row]="selectedRow()"
  [allRows]="allRows()"
  [batchHealth]="batchHealth()"
  (closed)="selectedRow.set(null)">
</app-tag-detail-drawer>
