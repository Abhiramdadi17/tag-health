<div class="flex flex-col h-full overflow-hidden" [style.background]="C().BG_BASE">

  <app-unified-tags-table
    [rows]="filteredRows()"
    [batchHealth]="batchHealth()"
    [zoneOptions]="zoneOptionsList()"
    [statusOptions]="statusOptionsList()"
    [selectedZone]="selectedZone()"
    [selectedStatus]="selectedStatus()"
    [onlyDataAvailable]="onlyDataAvailable()"
    [dataAvailableCount]="dataAvailableCount()"
    [dateFrom]="dateFrom()"
    [dateTo]="dateTo()"
    [activePreset]="activePreset()"
    [dateHint]="formatRangeHint()"
    [zoneFilters]="zoneFilters()"
    [psmOpts]="psmOptions()"
    [sigmaOpts]="sigmaOptions()"
    [siloOpts]="siloOptions()"
    [packagingOpts]="packagingOptions()"
    [zoneFiltersOpen]="zoneFiltersOpen()"
    [activeFilterCount]="activeFilterCount()"
    [filter]="filter()"
    [loading]="loading()"
    [error]="error()"
    [globalHealth]="globalHealthScore()"
    (zoneChange)="setZone($event)"
    (statusChange)="setStatus($event)"
    (dataAvailableChange)="onlyDataAvailable.set($event)"
    (dateFromChange)="dateFrom.set($event)"
    (dateToChange)="dateTo.set($event)"
    (applyPreset)="applyDatePreset($event)"
    (clearDate)="clearDateRange()"
    (zoneFiltersOpenChange)="zoneFiltersOpen.set($event)"
    (filterChange)="handleFilterChange($event)"
    (resetFilters)="resetZoneFilters()"
    (filterTextChange)="filter.set($event)"
    (refresh)="refresh()"
    (rowClick)="selectedRow.set($event)">
  </app-unified-tags-table>

</div>

<!-- Tag detail drawer (portal-like, fixed positioning) -->
<app-tag-detail-drawer
  [row]="selectedRow()"
  [allRows]="allRows()"
  [batchHealth]="batchHealth()"
  (closed)="selectedRow.set(null)">
</app-tag-detail-drawer>
