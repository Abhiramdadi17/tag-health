<header class="sticky top-0 z-40 border-b"
        [style.background]="C().BG_PANEL"
        [style.border-color]="C().BORDER">
  <div class="h-14 px-6 flex items-center justify-between">
    <!-- Logo + plant selector -->
    <div class="flex items-center gap-4">
      <div class="font-bold text-base tracking-widest" [ngStyle]="logoStyle()">
        TAG MONITOR
      </div>
      <nav class="flex items-center gap-1 text-xs">
        <a routerLink="/zones" routerLinkActive="active-nav"
           class="px-3 py-1 rounded transition-colors" [style.color]="C().MUTED"
           (mouseenter)="setHoverCyan($event)" (mouseleave)="setHoverMuted($event)">Zones</a>
      </nav>
      <select class="px-3 py-1 rounded text-sm"
              [ngStyle]="pillStyle()"
              [style.color]="C().TEXT">
        <option>Plant A</option>
        <option>Plant B</option>
        <option>Plant C</option>
      </select>
    </div>

    <!-- Right side -->
    <div class="flex items-center gap-3">
      <!-- Live indicator -->
      <div class="flex items-center gap-2 px-3 py-1 rounded text-xs font-medium border"
           [ngStyle]="pillStyle()">
        <div class="w-2 h-2 rounded-full"
             [ngStyle]="liveDotStyle()"
             [class.animate-live-pulse]="isStreaming()"></div>
        <span [style.color]="C().TEXT">{{ isStreaming() ? 'LIVE' : 'OFFLINE' }}</span>
      </div>

      <!-- Latency -->
      <div class="text-xs px-3 py-1 rounded border" [ngStyle]="pillStyle()">
        {{ latencyMs() }}ms
      </div>

      <!-- GPU -->
      <div class="text-xs px-3 py-1 rounded border" [ngStyle]="pillStyle()">
        GPU {{ (gpuLoad() * 100).toFixed(0) }}%
      </div>

      <!-- Alert badge -->
      <div *ngIf="alertCount() > 0"
           class="flex items-center gap-2 px-3 py-1 rounded border text-xs font-bold"
           [ngStyle]="alertBadgeStyle()">
        <lucide-angular [img]="AlertIcon" [size]="14"></lucide-angular>
        <span>{{ alertCount() }}</span>
      </div>

      <!-- Theme toggle -->
      <button (click)="toggleTheme()"
              class="p-2 rounded transition-colors"
              [title]="theme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
              [style.color]="C().MUTED"
              (mouseenter)="setHoverCyan($event)"
              (mouseleave)="setHoverMuted($event)">
        <lucide-angular *ngIf="theme() === 'dark'" [img]="SunIcon" [size]="16"></lucide-angular>
        <lucide-angular *ngIf="theme() === 'light'" [img]="MoonIcon" [size]="16"></lucide-angular>
      </button>

      <!-- Menu -->
      <button class="p-2 rounded transition-colors"
              [style.color]="C().MUTED"
              (mouseenter)="setHoverCyan($event)"
              (mouseleave)="setHoverMuted($event)">
        <lucide-angular [img]="MenuIcon" [size]="16"></lucide-angular>
      </button>
    </div>
  </div>
</header>
